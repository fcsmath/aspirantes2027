<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspirantes 2027 — CFO Paraíba</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #1a3a2a;
    --verde-medio: #2d5a3d;
    --verde-claro: #3d7a52;
    --dourado: #c9a84c;
    --dourado-claro: #e8c87a;
    --creme: #f5f0e8;
    --branco: #fafaf8;
    --texto: #1a1a18;
    --texto-suave: #4a4a42;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--verde);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 40px,
        rgba(201,168,76,0.04) 40px,
        rgba(201,168,76,0.04) 41px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 40px,
        rgba(201,168,76,0.04) 40px,
        rgba(201,168,76,0.04) 41px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* ── TELA DE SENHA ── */
  #gate {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.6s ease both;
  }

  .gate-emblem {
    text-align: center;
    margin-bottom: 2rem;
  }

  .emblem-ring {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,0.3);
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }

  .emblem-ring img {
    width: 130px;
    height: 130px;
    object-fit: contain;
    filter: invert(1) sepia(1) saturate(2) hue-rotate(5deg) brightness(0.85);
  }

  .gate-emblem h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--creme);
    line-height: 1;
    margin-bottom: 4px;
  }

  .gate-emblem p {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dourado);
    font-weight: 300;
  }

  .gate-card {
    background: rgba(250,250,248,0.04);
    border: 0.5px solid rgba(201,168,76,0.25);
    border-radius: 12px;
    padding: 2rem;
    backdrop-filter: blur(8px);
  }

  .gate-card label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dourado);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .pw-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .pw-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(201,168,76,0.4);
    border-radius: 8px;
    padding: 13px 16px;
    font-size: 15px;
    color: var(--creme);
    letter-spacing: 3px;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
  }

  .pw-wrap input::placeholder {
    letter-spacing: 1px;
    color: rgba(245,240,232,0.3);
    font-size: 13px;
  }

  .pw-wrap input:focus {
    border-color: var(--dourado);
    background: rgba(255,255,255,0.08);
  }

  .btn-enter {
    width: 100%;
    background: var(--dourado);
    color: var(--verde);
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-enter:hover { background: var(--dourado-claro); }
  .btn-enter:active { transform: scale(0.98); }

  .err-msg {
    font-size: 12px;
    color: #e87070;
    text-align: center;
    margin-top: 10px;
    min-height: 18px;
    letter-spacing: 0.5px;
  }

  /* ── PORTAL ── */
  #portal {
    display: none;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    animation: fadeUp 0.5s ease both;
  }

  #portal.visible { display: block; }

  .portal-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid rgba(201,168,76,0.2);
  }

  .portal-logo {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1px solid var(--dourado);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--dourado);
    flex-shrink: 0;
  }

  .portal-header-text h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--creme);
    line-height: 1;
    margin-bottom: 4px;
  }

  .portal-header-text p {
    font-size: 12px;
    color: var(--dourado);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .access-badge {
    margin-left: auto;
    background: rgba(61,122,82,0.3);
    border: 0.5px solid rgba(61,122,82,0.6);
    color: #7ec89a;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.6);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .files-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .file-card {
    background: rgba(250,250,248,0.04);
    border: 0.5px solid rgba(201,168,76,0.15);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s, background 0.2s;
  }

  .file-card:hover {
    border-color: rgba(201,168,76,0.35);
    background: rgba(250,250,248,0.06);
  }

  .file-type-badge {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: rgba(201,168,76,0.1);
    border: 0.5px solid rgba(201,168,76,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .file-info { flex: 1; }

  .file-info .file-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--creme);
    display: block;
    margin-bottom: 3px;
  }

  .file-info .file-meta {
    font-size: 12px;
    color: rgba(245,240,232,0.4);
    letter-spacing: 0.5px;
  }

  .btn-download {
    background: transparent;
    border: 0.5px solid var(--dourado);
    color: var(--dourado);
    border-radius: 7px;
    padding: 8px 18px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-decoration: none;
    display: inline-block;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s;
  }

  .btn-download:hover {
    background: var(--dourado);
    color: var(--verde);
  }

  .portal-footer {
    margin-top: 2rem;
    padding-top: 1.25rem;
    border-top: 0.5px solid rgba(201,168,76,0.1);
    text-align: center;
    font-size: 11px;
    color: rgba(245,240,232,0.25);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .access-badge { display: none; }
    .btn-download { padding: 8px 12px; font-size: 11px; }
  }
</style>
</head>
<body>

<!-- TELA DE SENHA -->
<div id="gate">
  <div class="gate-emblem">
    <div class="emblem-ring">
      <img src="logo.png" alt="Aspirantes 2027" />
    </div>
    <h1>Aspirantes 2027</h1>
    <p>CFO · Paraíba · Acesso Restrito</p>
  </div>

  <div class="gate-card">
    <label>Senha da turma</label>
    <div class="pw-wrap">
      <input type="password" id="pw-input" placeholder="Digite a senha de acesso" autocomplete="off" />
    </div>
    <button class="btn-enter" onclick="checkPassword()">Entrar</button>
    <div class="err-msg" id="err-msg"></div>
  </div>
</div>

<!-- PORTAL -->
<div id="portal">
  <div class="portal-header">
    <div class="portal-logo">A27</div>
    <div class="portal-header-text">
      <h2>Turma Aspirantes 2027</h2>
      <p>Portal de Materiais — CFO Paraíba</p>
    </div>
    <span class="access-badge">✓ Acesso autorizado</span>
  </div>

  <div class="section-label">Documentos disponíveis</div>

  <div class="files-list">

    <div class="file-card">
      <div class="file-type-badge">📄</div>
      <div class="file-info">
        <span class="file-name">Fluidos_01_modelo</span>
        <span class="file-meta">Modelo · Pasta: Modelos</span>
      </div>
      <a class="btn-download" href="https://drive.google.com/uc?export=download&id=1cT1U-IJI0gSXpJc7_ejdEYZ82lHqzg0d" target="_blank">Baixar</a>
    </div>

  </div>

  <div class="portal-footer">
    Atualizado pelo responsável da turma &nbsp;·&nbsp; Aspirantes 2027 — CFO/PB
  </div>
</div>

<script>
  function checkPassword() {
    var input = document.getElementById('pw-input').value;
    if (input === 'fenamissao') {
      document.getElementById('gate').style.display = 'none';
      var portal = document.getElementById('portal');
      portal.style.display = 'block';
      portal.classList.add('visible');
    } else {
      document.getElementById('err-msg').textContent = 'Senha incorreta. Tente novamente.';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });
</script>

</body>
</html>
